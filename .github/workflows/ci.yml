name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Test sentinelgate-local-agent
        run: npm run test --workspace sentinelgate-local-agent

      - name: Test sentinelgate-cloud-platform
        run: npm run test --workspace sentinelgate-cloud-platform
